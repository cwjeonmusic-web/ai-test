name: Gemini AI Security Scan

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 최신 버전으로 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5 # 최신 버전으로 업데이트
        with:
          python-version: '3.10' # 3.9에서 3.10으로 업그레이드

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-generativeai

      - name: Run Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scan.py
