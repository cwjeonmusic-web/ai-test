name: Gemini AI Security Scan

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 버전을 3.11로 더 높였습니다.

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -U google-generativeai # 최신 버전 강제 업데이트

      - name: Run Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scan.py
