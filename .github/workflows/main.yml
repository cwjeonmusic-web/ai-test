name: Gemini AI Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # 댓글 작성을 위해 쓰기 권한이 필요합니다.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Run Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 별도 설정 없이 자동 생성되는 토큰입니다.
          PR_NUMBER: ${{ github.event.pull_request.number }} # PR 번호를 가져옵니다.
          REPO: ${{ github.repository }} # '사용자명/저장소명'을 가져옵니다.
        run: python scan.py
